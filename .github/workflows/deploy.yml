name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check-sheet:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: Restore previous sheet hash
        uses: actions/cache/restore@v4
        with:
          path: .sheet-hash
          key: sheet-content-hash

      - name: Compare sheet content
        id: compare
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        run: |
          curl -fsSL "$GOOGLE_SHEET_CSV_URL" -o sheet.csv
          new_hash=$(sha256sum sheet.csv | awk '{ print $1 }')
          old_hash=$(cat .sheet-hash 2>/dev/null || true)

          if [ "$new_hash" = "$old_hash" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sheet unchanged — skipping deploy."
          else
            echo "$new_hash" > .sheet-hash
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Sheet changed — deploy will run."
          fi

      - name: Save sheet hash
        if: steps.compare.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: .sheet-hash
          key: sheet-content-hash

  deploy:
    needs: check-sheet
    if: |
      always() && (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        (needs.check-sheet.result == 'success' && needs.check-sheet.outputs.changed == 'true')
      )
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID }}
          GOOGLE_SHEET_RANGE: ${{ secrets.GOOGLE_SHEET_RANGE }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
