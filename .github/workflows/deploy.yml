name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GOOGLE_SHEET_ITEMS_CSV_URL: ${{ secrets.GOOGLE_SHEET_ITEMS_CSV_URL }}
          GOOGLE_SHEET_STATIC_CSV_URL: ${{ secrets.GOOGLE_SHEET_STATIC_CSV_URL }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_ITEMS_GID: ${{ secrets.GOOGLE_SHEET_ITEMS_GID }}
          GOOGLE_SHEET_STATIC_GID: ${{ secrets.GOOGLE_SHEET_STATIC_GID }}
          GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID }}
          GOOGLE_SHEET_ITEMS_RANGE: ${{ secrets.GOOGLE_SHEET_ITEMS_RANGE }}
          GOOGLE_SHEET_STATIC_RANGE: ${{ secrets.GOOGLE_SHEET_STATIC_RANGE }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
